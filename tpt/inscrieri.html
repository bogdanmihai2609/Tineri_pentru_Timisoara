  <!-- Formular de login -->
  <main style="text-align: center;">
    <h2>Autentificare</h2>

    <form action="#" method="post">
      <label for="username">Nume utilizator:</label><br>
      <input type="text" id="username" name="username" required><br><br>

      <label for="password">Parolă:</label><br>
      <input type="password" id="password" name="password" required><br>

    <input type="checkbox" name="remember" />Remember me</label><br><br>

      <button type="submit">Login</button>
    </form>

    <p>Nu ai cont? <a style="color: aqua;" href="register.html">Înregistrează-te</a></p>
  </main>
  <script>
  const form = document.querySelector('form');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const emailInput = document.getElementById('username').value;
    const passwordInput = document.getElementById('password').value;

    const storedUser = JSON.parse(localStorage.getItem('user'));

    if (storedUser && storedUser.email === emailInput && storedUser.password === passwordInput) {
      alert('Autentificare reușită! Bine ai venit, ' + storedUser.name);
      // Redirectează spre o pagină de profil, dacă vrei
      // window.location.href = "profil.html";
    } else {
      alert('Email sau parolă incorectă!');
    }
  };
</script>
